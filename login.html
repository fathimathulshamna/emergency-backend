<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            background: #2c3e50;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #27ae60;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Admin Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script>
function login() {

    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    // 🔐 SIMPLE LOGIN (change this)
    if (user === "admin" && pass === "1234") {

        localStorage.setItem("loggedIn", "true");

        window.location.href = "admin.html";

    } else {
        alert("Invalid login");
    }
}
</script>

</body>
</html>
